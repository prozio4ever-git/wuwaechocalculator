            margin: 40px auto;
            padding: 20px;
            border-radius: 12px;

            background: #2d2d35;

            border: 1px solid #3f3f46;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;

            background: #2d2d35; color: #94a3b8; border: 1px solid #3f3f46;
            padding: 10px 20px; font-size: 15px; font-weight: bold; border-radius: 6px;
            cursor: pointer; flex: 1; transition: all 0.2s;
        }
        .tab-btn.active { background: #0284c7; color: white; border-color: #0284c7; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .table-header {
            display: flex;
            align-items: center;
            padding: 0 12px 6px 12px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: bold;
        }
        .slot-row-unified {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            background: #2d2d35;
            padding: 12px;
            border-radius: 8px;
        }

        .col-lock { width: 50px; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .col-label { width: 80px; font-weight: bold; display: flex; justify-content: center; align-items: center; flex-shrink: 0; box-sizing: border-box; }
        
        .col-normal-type { flex: 1; margin-left: 6px; margin-right: 6px; }
        .col-normal-val { flex: 1; margin-left: 6px; margin-right: 6px; }
        .col-reroll-type { flex: 1.2; margin-left: 6px; margin-right: 6px; }
        .col-reroll-val { flex: 1.2; margin-left: 6px; margin-right: 6px; }
        .col-reroll-want { flex: 1.6; display: flex; flex-direction: column; gap: 4px; margin-left: 6px; margin-right: 6px; }

        .header-text { width: 100%; text-align: center; }

        select {
            background: #3f3f46; color: white; border: 1px solid #52525b;
            padding: 8px 6px; border-radius: 6px; font-size: 13px; width: 100%;
            box-sizing: border-box;
        }
        select:disabled, input:disabled { opacity: 0.3; cursor: not-allowed; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button.action-btn {
            flex: 1; color: white; border: none; padding: 14px;
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer;
            transition: background 0.2s;
        }
        .btn-calc { background: #0284c7; } .btn-calc:hover { background: #0369a1; }
        .btn-sim { background: #b45309; } .btn-sim:hover { background: #92400e; }
        .btn-info { background: #4b5563; max-width: 180px; } .btn-info:hover { background: #374151; }
        
        .result-panel {
            margin-top: 20px; padding: 20px; background: #14532d;
            border: 1px solid #166534; border-radius: 8px; display: none; line-height: 1.6;
        }
        .result-panel.sim-style { background: #1e3a8a; border-color: #1e40af; }
        .prob-display {
            font-family: 'Courier New', Courier, monospace; background: rgba(0,0,0,0.3);
            padding: 10px; border-radius: 6px; margin: 8px 0; word-break: break-all;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); display: flex; justify-content: center;
            align-items: center; z-index: 1000; visibility: hidden; opacity: 0;
            transition: opacity 0.2s, visibility 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: #22222a; width: 90%; max-width: 550px; max-height: 80vh;
            overflow-y: auto; border-radius: 12px; padding: 20px; border: 1px solid #3f3f46;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3f3f46; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-title-link { text-decoration: none; color: #facc15; font-weight: bold; }
        .modal-title-link:hover { text-decoration: underline; }
        .modal-close { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
        th, td { border: 1px solid #3f3f46; padding: 8px; text-align: left; }
        th { background: #2d2d35; color: #38bdf8; }
        .stat-section-title { background: #1e1e24; color: #facc15; font-weight: bold; }
    </style>
</head>

            document.getElementById('btn-sim-reroll').innerText = dict.btnSimReroll;
            document.getElementById('btn-calc-reroll').innerText = dict.btnCalcReroll;
            document.getElementById('modal-link-text').innerText = dict.modalLink;

            document.querySelectorAll('.label-slot-text').forEach((el, idx) => {
                el.innerHTML = `${dict.labelSlot} ${(idx % 5) + 1}`;
            });

            for(let i = 1; i <= 5; i++) {
                refreshSelectOptions(`ntype-${i}`, dict.selectLimit);
                refreshSelectOptions(`rtype-${i}`, dict.selectEmpty);
                refreshSelectOptions(`wtype-${i}`, dict.selectWantType, true);
                
                if(document.getElementById(`nvalue-${i}`).disabled) {
                    document.getElementById(`nvalue-${i}`).innerHTML = `<option value="">${dict.selectValLimit}</option>`;
                } else {
                    const savedVal = document.getElementById(`nvalue-${i}`).value;
                    const type = document.getElementById(`ntype-${i}`).value;
                    document.getElementById(`nvalue-${i}`).innerHTML = `<option value="">${dict.selectValLimit}</option>` + subStatsData[type].map((item, idx) => `<option value="${idx}">${formatStatName(item.name)}</option>`).join('');
                    document.getElementById(`nvalue-${i}`).value = savedVal;
                }
                
                if(document.getElementById(`rval-${i}`).disabled) {
                    document.getElementById(`rval-${i}`).innerHTML = `<option value="">${dict.selectVal}</option>`;
                } else {
                    const savedVal = document.getElementById(`rval-${i}`).value;
                    const type = document.getElementById(`rtype-${i}`).value;
                    document.getElementById(`rval-${i}`).innerHTML = `<option value="">${dict.selectVal}</option>` + subStatsData[type].map((item, idx) => `<option value="${idx}">${formatStatName(item.name)}</option>`).join('');
                    document.getElementById(`rval-${i}`).value = savedVal;
                }
                
                if(document.getElementById(`wval-${i}`).disabled) {
                    document.getElementById(`wval-${i}`).innerHTML = `<option value="">${dict.selectWantVal}</option>`;
                } else {
                    const savedVal = document.getElementById(`wval-${i}`).value;
                    const type = document.getElementById(`wtype-${i}`).value;
                    document.getElementById(`wval-${i}`).innerHTML = `<option value="">${dict.selectWantVal}</option>` + subStatsData[type].map((item, idx) => `<option value="${idx}">≥ ${formatStatName(item.name)}</option>`).join('');
                    document.getElementById(`wval-${i}`).value = savedVal;
                }
            }

            renderModalTable();

            if(document.getElementById('normal-result').style.display === 'block') calculateNormal();
            if(document.getElementById('reroll-result').style.display === 'block' && !document.getElementById('reroll-result').classList.contains('sim-style')) calculateRerollProbability();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function onNormalTypeChange() {
            let selected = [];
            for(let i=1; i<=5; i++) { let v = document.getElementById(`ntype-${i}`).value; if(v) selected.push(v); }
            for(let i=1; i<=5; i++) {
                let sel = document.getElementById(`ntype-${i}`); let cur = sel.value;
                Array.from(sel.options).forEach(opt => { if(opt.value && selected.includes(opt.value) && opt.value !== cur) { opt.style.display = 'none'; } else { opt.style.display = 'block'; } });
                updateSelectOptions(`nvalue-${i}`, cur);
            }
        }

        function onRerollCurrentTypeChange(idx) {
            let selected = [];
            for(let i=1; i<=5; i++) { let v = document.getElementById(`rtype-${i}`).value; if(v) selected.push(v); }
            for(let i=1; i<=5; i++) {
                let sel = document.getElementById(`rtype-${i}`); let cur = sel.value;
                Array.from(sel.options).forEach(opt => { if(opt.value && selected.includes(opt.value) && opt.value !== cur) { opt.style.display = 'none'; } else { opt.style.display = 'block'; } });
            }
            let type = document.getElementById(`rtype-${idx}`).value;
            let valSel = document.getElementById(`rval-${idx}`);
            valSel.innerHTML = `<option value="">${i18n[currentLang].selectVal}</option>`;
            if(type) { valSel.disabled = false; subStatsData[type].forEach((item,i) => valSel.innerHTML+=`<option value="${i}">${formatStatName(item.name)}</option>`); } else { valSel.disabled = true; }
        }

        function onRerollWantTypeChange(idx) {
            let wtypeSel = document.getElementById(`wtype-${idx}`);
            let wvalSel = document.getElementById(`wval-${idx}`);
            let wt = wtypeSel.value; 
            
            wvalSel.innerHTML = `<option value="">${i18n[currentLang].selectWantVal}</option>`;
            if(wt) { 
                wvalSel.disabled = false; 
                subStatsData[wt].forEach((item,i) => wvalSel.innerHTML+=`<option value="${i}">≥ ${formatStatName(item.name)}</option>`); 
            } else { 
                wvalSel.disabled = true; 
            }
        }

        function onLockToggle(idx) {
            const isLocked = document.getElementById(`lock-${idx}`).checked;
            document.getElementById(`rtype-${idx}`).disabled = isLocked;
            document.getElementById(`rval-${idx}`).disabled = isLocked;
            document.getElementById(`wtype-${idx}`).disabled = isLocked;
            document.getElementById(`wval-${idx}`).disabled = isLocked;
        }

        function updateSelectOptions(valId, type) {
            let vSel = document.getElementById(valId);
            let prev = vSel.value; vSel.innerHTML = `<option value="">${i18n[currentLang].selectValLimit}</option>`;
            if(type) {
                vSel.disabled = false;
                subStatsData[type].forEach((item, i) => vSel.innerHTML += `<option value="${i}">${formatStatName(item.name)}</option>`);
                if(prev !== "" && prev < subStatsData[type].length) vSel.value = prev;
            } else { vSel.disabled = true; }
        }

        function checkLockLegality() {
            for (let i = 1; i <= 5; i++) {
                if (document.getElementById(`lock-${i}`).checked) {
                    let type = document.getElementById(`rtype-${i}`).value;
                    if (!type) {
                        alert(i18n[currentLang].alertLockEmpty.replace("{idx}", i));
                        return false;
                    }
                }
            }
            return true;
        }

        function calculateNormal() {
            let selectedTypes = []; let valueMultipliers = 1;
            for (let i = 1; i <= 5; i++) {
                let type = document.getElementById(`ntype-${i}`).value;
                let valIdx = document.getElementById(`nvalue-${i}`).value;
                if (type) {
                    selectedTypes.push(type);
                    if (valIdx !== "") {
                        let sum = 0; for (let j = parseInt(valIdx); j < subStatsData[type].length; j++) sum += subStatsData[type][j].prob;
                        valueMultipliers *= sum;
                    }
                }
            }
            let k = selectedTypes.length;
            let comboProbability = 1;
            if (k > 0) { for (let i = 0; i < k; i++) { comboProbability *= (5 - i) / (TOTAL_STATS - i); } }
            let finalProbability = comboProbability * valueMultipliers;
            renderFinalResult(document.getElementById('normal-result'), finalProbability);
        }

        function simulateReroll() {
            if (!checkLockLegality()) return;

            let lockedTypes = [];
            for(let i=1; i<=5; i++) {
                if(document.getElementById(`lock-${i}`).checked) {
                    lockedTypes.push(document.getElementById(`rtype-${i}`).value);
                }
            }
            if(lockedTypes.length >= 5) { alert(i18n[currentLang].alertLockAll); return; }

            let pool = Object.keys(subStatsData).filter(x => !lockedTypes.includes(x));
            
            for(let i=1; i<=5; i++) {
                if(!document.getElementById(`lock-${i}`).checked) {
                    if(pool.length === 0) break;
                    let randTypeIdx = Math.floor(Math.random() * pool.length);
                    let rolledType = pool.splice(randTypeIdx, 1)[0];
                    
                    let rArr = subStatsData[rolledType];
                    let randValIdx = 0; let r = Math.random(); let cum = 0;
                    for(let j=0; j<rArr.length; j++) { cum += rArr[j].prob; if(r <= cum) { randValIdx = j; break; } }

                    document.getElementById(`rtype-${i}`).value = rolledType;
                    onRerollCurrentTypeChange(i);
                    document.getElementById(`rval-${i}`).value = randValIdx;
                }
            }
            
            let resDiv = document.getElementById('reroll-result');
            resDiv.className = "result-panel sim-style";
            resDiv.innerHTML = i18n[currentLang].resultSimSuccess;
            resDiv.style.display = 'block';
        }

        function calculateRerollProbability() {
            if (!checkLockLegality()) return;

            let lockedTypes = []; let wantTypes = []; let wantValues = [];
            for(let i=1; i<=5; i++) {
                if(document.getElementById(`lock-${i}`).checked) {
                    let t = document.getElementById(`rtype-${i}`).value;
                    if(t) lockedTypes.push(t);
                } else {
                    let wt = document.getElementById(`wtype-${i}`).value;
                    let wv = document.getElementById(`wval-${i}`).value;
                    if(wt) {
                        const translatedName = statTranslations[wt][currentLang];
                        if(lockedTypes.includes(wt)) { alert(i18n[currentLang].alertConflict.replace("{wt}", translatedName)); return; }
                        if(wantTypes.includes(wt)) { alert(i18n[currentLang].alertDuplicate.replace("{wt}", translatedName)); return; }
                        wantTypes.push(wt); wantValues.push(wv !== "" ? parseInt(wv) : -1);
                    }
                }
            }

            let m = lockedTypes.length; let n = wantTypes.length; let unLockedCount = 5 - m;
            if(n > unLockedCount) { alert(i18n[currentLang].alertOver格); return; }

            let comboProb = 1;
            if (n > 0) { for (let i = 0; i < n; i++) { comboProb *= (unLockedCount - i) / ((TOTAL_STATS - m) - i); } }

            let valMultiplier = 1;
            for(let i=0; i<wantTypes.length; i++) {
                let type = wantTypes[i]; let startIdx = wantValues[i];
                if(startIdx !== -1) {
                    let sum = 0; for(let j=startIdx; j<subStatsData[type].length; j++) sum += subStatsData[type][j].prob;
                    valMultiplier *= sum;
                }
            }

            let finalProb = comboProb * valMultiplier;
            renderFinalResult(document.getElementById('reroll-result'), finalProb);
        }

        function renderFinalResult(targetDiv, prob) {
            let dict = i18n[currentLang];
            let pctText = prob < 0.000001 ? (prob * 100).toExponential(6) + "%" : (prob * 100).toFixed(6).replace(/\.?0+$/, "") + "%";
            let denom = prob === 0 ? "无限" : BigInt(Math.round(1 / prob)).toLocaleString();
            
            targetDiv.innerHTML = `
                <strong>${dict.resultSuccess}</strong><br><br>
                ${dict.resultProbTitle}
                <div class="prob-display" style="color: #4ade80; font-size: 16px;">
                    ${dict.resultFormNormal}: ${pctText}<br>${dict.resultFormSci}: ${prob.toExponential(6)}
                </div>
                ${dict.resultExpect}<br>
                ${dict.resultExpectDesc.replace("{denom}", denom)}
            `;
            targetDiv.style.display = 'block';
        }

        function toggleModal(show) { document.getElementById('probModal').classList[show?'add':'remove']('active'); }
        
        function renderModalTable() {
            let dict = i18n[currentLang];
            let tableHTML = `<table><thead><tr><th>${dict.thModal1}</th><th>${dict.thModal2}</th><th>${dict.thModal3}</th></tr></thead><tbody>`;
            Object.keys(subStatsData).forEach(name => {
                const translatedCategory = statTranslations[name][currentLang];
                tableHTML += `<tr><td colspan="3" class="stat-section-title">${translatedCategory}</td></tr>`;
                let arr = subStatsData[name];
                for (let i = 0; i < arr.length; i++) {
                    let sum = 0; for (let j = i; j < arr.length; j++) sum += arr[j].prob;
                    tableHTML += `<tr><td>≥ ${formatStatName(arr[i].name)}</td><td>${(arr[i].prob*100).toFixed(4)}%</td><td style="color:#facc15;">${(sum*100).toFixed(4)}%</td></tr>`;
                }
            });
            document.getElementById('modal-table-container').innerHTML = tableHTML + '</tbody></table>';
        }

        document.getElementById('btn-sim-reroll').onclick = simulateReroll;

        changeLanguage('zh');
    </script>
</body>
</html>
